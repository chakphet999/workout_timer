<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Time Counter - จับเวลาเป็นเซต</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
      font-family: 'Kanit', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 340px;
      width: 100%;
      margin: 32px 0;
      background: rgba(255,255,255,0.96);
      border-radius: 32px;
      box-shadow: 0 6px 34px 0 #90caf940;
      padding: 22px 18px 20px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container h2 {
      color: #6048c4;
      font-weight: 700;
      letter-spacing: 1.2px;
      margin-bottom: 18px;
      margin-top: 5px;
      font-size: 1.3em;
    }
    label {
      display: block;
      margin-bottom: 6px;
      margin-top: 12px;
      font-size: 1.03em;
      color: #4b4b4b;
      font-weight: 500;
      text-align: left;
    }
    input[type="number"] {
      width: 97%;
      padding: 10px;
      border-radius: 8px;
      font-size: 1em;
      outline: none;
      border: 1.5px solid #a6bdfc;
      margin-bottom: 1px;
      transition: border .15s;
    }
    input[type="number"]:focus {
      border: 2px solid #6048c4;
    }
    .button-row {
      display: flex;
      gap: 6px;
      width: 100%;
      margin: 14px 0 0 0;
    }
    button {
      font-family: inherit;
      font-size: 1em;
      font-weight: 600;
      border: none;
      outline: none;
      border-radius: 12px;
      padding: 10px 0;
      flex: 1 1 0;
      cursor: pointer;
      transition: background 0.18s, color .21s, box-shadow .14s;
    }
    #btn-start {
      background: linear-gradient(90deg, #56ccf2 60%, #6048c4 130%);
      color: #fff;
      box-shadow: 0 1px 5px #56ccd24a;
    }
    #btn-stop {
      background: #b2bec3;
      color: #444;
    }
    #btn-reset {
      background: #b2bec3;
      color: #444;
    }
    button[disabled] {
      background: #e3e3e3 !important;
      color: #888 !important;
      cursor: not-allowed;
    }
    .progress-ct {
      width: 100%;
      margin-top: 16px;
      margin-bottom: 1px;
    }
    .progress-title {
      font-size: 0.97em;
      color: #666;
      margin-bottom: 4px;
      margin-left: 9px;
      text-align: left;
    }
    .progress-bar {
      width: 100%;
      height: 14px;
      background: #ecf0f1;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 6px;
      box-shadow: 0 1px 6px 0 #90caf981;
    }
    .progress-done {
      height: 100%;
      background: linear-gradient(90deg, #43e97b 60%, #38f9d7 120%);
      border-radius: 8px;
      transition: width 0.44s cubic-bezier(.86,.04,.36,1.33);
    }
    .progress-done.danger {
      background: linear-gradient(90deg,#fd5a51 60%, #67e8f9 150%);
    }
    .info-bar {
      color: #2e3238;
      width: 100%;
      margin: 9px 0 0 9px;
      text-align: left;
      font-size: 1em;
    }
    .status {
      width: 97%;
      margin-top: 14px;
      padding: 14px 0 10px 0;
      border-radius: 15px;
      background: #e7fbff;
      min-height: 38px;
      font-size: 1.12em;
      font-weight: 500;
      color: #30475e;
      text-align: center;
      transition: background 0.19s, color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .status.success  { background: #dcffe5; color: #247333; }
    .status.alert    { background: #ffede7; color: #e17055; }
    .status .emoji   { font-size: 1.65em; display:inline-block;margin-right:2px;}
    @media (max-width:480px) {
      .container { padding: 10px 2px 18px; max-width:99vw;}
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>... TIME COUNTER ...</h2>
    <form id="timerForm" autocomplete="off">
      <label for="sets">จำนวนเซต</label>
      <input type="number" id="sets" value="4" min="1" max="50" required>
      <label for="seconds">วินาทีต่อเซต</label>
      <input type="number" id="seconds" value="3" min="1" max="3600" required>
      <div class="button-row">
        <button type="submit" id="btn-start">เริ่มจับเวลา</button>
        <button type="button" id="btn-stop" disabled>หยุด</button>
        <button type="button" id="btn-reset" disabled>รีเซ็ต</button>
      </div>
    </form>
    <div class="progress-ct">
      <div class="progress-title">ภาพรวมเซต</div>
      <div class="progress-bar"><div class="progress-done" id="barSet" style="width:0%"></div></div>
      <div class="progress-title">เวลาของเซตปัจจุบัน</div>
      <div class="progress-bar"><div class="progress-done" id="barTick" style="width:0%"></div></div>
    </div>
    <div class="info-bar" id="totalTime">เวลารวม ~0:00 นาที</div>
    <div class="status" id="status"><span class="emoji">🕒</span>พร้อมเริ่ม</div>
  </div>
  <script>
    // ใช้ context เดียวสำหรับ iOS/Safari
    let ctx = null;
    function beep(f=1200, dur=240, vol=0.14, type='sine') {
      try {
        if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();
        oscillator.type = type;
        oscillator.frequency.value = f;
        oscillator.connect(gain);
        gain.connect(ctx.destination);
        gain.gain.value = vol;
        oscillator.start();
        setTimeout(() => {
          oscillator.stop();
          oscillator.disconnect();
          gain.disconnect();
        }, dur);
      } catch(e){}
    }
    function beepSuccess() { beep(1420,180,0.13,'triangle'); }
    function beepAlert()   { beep(360,420,0.13,'square'); }
    function resetBeepContext() {
      if (ctx) { ctx.close(); ctx = null; }
    }

    // selectors
    const form      = document.getElementById('timerForm');
    const statusEl  = document.getElementById('status');
    const btnStart  = document.getElementById('btn-start');
    const btnStop   = document.getElementById('btn-stop');
    const btnReset  = document.getElementById('btn-reset');
    const barSet    = document.getElementById('barSet');
    const barTick   = document.getElementById('barTick');
    const totalTimeEl = document.getElementById('totalTime');
    const inputs    = [document.getElementById('sets'), document.getElementById('seconds')];
    let running = false, stopped = false, resetCalled = false;
    let sets = 0, seconds = 0, s = 0, sec = 0, completedSets = 0;

    function showInfoTotal() {
      const setVal = Number(inputs[0].value) || 0;
      const secVal = Number(inputs[1].value) || 0;
      let totalSecs = setVal * secVal;
      let mm = Math.floor(totalSecs / 60), ss = totalSecs % 60;
      if (mm < 1) {
        totalTimeEl.textContent = `เวลารวม ~${ss} วินาที`;
      } else {
        totalTimeEl.textContent = `เวลารวม ~${mm}:${ss.toString().padStart(2,"0")} นาที`;
      }
    }
    showInfoTotal();

    async function startTimer() {
      sets = parseInt(inputs[0].value, 10);
      seconds = parseInt(inputs[1].value, 10);
      s = 1; completedSets = 0;
      running = true; stopped = false; resetCalled = false;

      inputs.forEach(el=> el.disabled = true);
      btnStart.disabled = true;
      btnStop.disabled  = false;
      btnReset.disabled = false;
      barSet.style.width = "0%";
      barTick.style.width = "0%";
      barSet.className = "progress-done";
      barTick.className = "progress-done";
      statusEl.innerHTML = `<span class="emoji">🟢</span>กำลังจับเวลา...`;

      for (s = 1; s <= sets; s++) {
        let thisSet = s;
        for (sec = seconds; sec > 0; sec--) {
          if (!running || stopped || resetCalled) return;
          let emoji = (sec > seconds/2) ? "💪" : (sec<=5 ? "🔥" : "🙂");
          statusEl.innerHTML = `<span class="emoji">${emoji}</span>เซตที่ ${thisSet}/${sets} เหลือ ${sec} วินาที`;
          // progress
          let percentTick = ((seconds-sec+1)/seconds)*100;
          barTick.style.width = percentTick + "%";
          barSet.style.width = ( (s-1)/sets*100 ) + "%";
          if (sec<=5) {
            barTick.className = "progress-done danger";
          } else {
            barTick.className = "progress-done";
          }
          await sleep(1000);
        }
        if (!running || stopped || resetCalled) return;
        completedSets++;
        barSet.style.width = (completedSets/sets*100) + "%";
        barTick.style.width = "100%";
        statusEl.innerHTML = `<span class="emoji">👏</span>เซตที่ ${s} หมดเวลา!`;
        statusEl.className = 'status alert';
        beepAlert();
        await sleep(1200);
        barTick.style.width = "0%";
      }
      if (!running || stopped || resetCalled) return;
      barSet.style.width = "100%";
      statusEl.innerHTML = `<span class="emoji">🎉</span>เยี่ยม! ครบเซต!`;
      statusEl.className = "status success";
      beepSuccess();
      stopTimer(true);
    }
    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }
    function stopTimer(isDone) {
      running = false; stopped = !isDone;
      inputs.forEach(el => el.disabled = false);
      btnStart.disabled = false;
      btnStop.disabled = true;
      btnReset.disabled = !stopped && !resetCalled;
      if (!isDone && !resetCalled) {
        statusEl.innerHTML = `<span class="emoji">⏸️</span>หยุดการจับเวลา`;
        statusEl.className = "status alert";
      }
    }
    function resetTimer() {
      resetBeepContext();
      resetCalled = true; running = false; stopped = false;
      inputs.forEach(el=> el.disabled = false);
      btnStart.disabled = false;
      btnStop.disabled = true;
      btnReset.disabled = true;
      barSet.style.width = "0%"; barTick.style.width = "0%";
      statusEl.innerHTML = `<span class="emoji">🕒</span>พร้อมเริ่ม`;
      statusEl.className = "status";
      showInfoTotal();
    }
    form.onsubmit = function(e) {
      e.preventDefault();
      if (!running) startTimer();
    };
    btnStop.onclick = function() { if (running) stopTimer(false); };
    btnReset.onclick = function() { resetTimer(); };
    inputs.forEach(inp => {
      inp.addEventListener('input', e => {
        const max = parseInt(inp.max,10);
        if (inp.value !== "" && max && parseInt(inp.value,10) > max) inp.value = max;
        showInfoTotal();
      });
    });
  </script>
</body>
</html>
